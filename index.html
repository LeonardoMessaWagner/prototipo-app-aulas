<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protótipo — App de Aulas</title>
<style>
  :root{
    --primary:#4A3AFF; --orange:#FF7A45; --teal:#00C2A8; --yellow:#FFC93C;
    --pink:#FF5C7A; --ink:#1A1A2E; --muted:#8A8AA3; --bg:#F7F7FB;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:#ece9f6;color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px 12px 70px;}
  h1{font-size:20px;margin-bottom:4px;text-align:center;}
  .sub{font-size:13px;color:var(--muted);margin-bottom:16px;text-align:center;max-width:440px;}

  .controls{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:20px;}
  .roleswitch{display:inline-flex;flex-wrap:wrap;justify-content:center;background:#fff;border-radius:30px;padding:5px;box-shadow:0 4px 14px rgba(26,26,46,.08);}
  .roleswitch button{border:none;background:none;font-size:13px;font-weight:700;color:var(--muted);
    padding:9px 16px;border-radius:24px;cursor:pointer;transition:.15s;}
  .roleswitch button.on{background:var(--primary);color:#fff;}
  .reset{font-size:12px;color:var(--muted);background:none;border:1px solid #d9d5ea;border-radius:20px;padding:6px 14px;cursor:pointer;}

  .phone{width:340px;background:var(--ink);border-radius:44px;padding:13px;box-shadow:0 26px 60px rgba(26,26,46,.35);}
  .device{background:var(--bg);border-radius:33px;overflow:hidden;height:710px;display:flex;flex-direction:column;position:relative;}
  .screen{display:flex;flex-direction:column;height:100%;}

  .top{padding:18px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;}
  .top .hi{font-size:12px;color:var(--muted);} .top .nm{font-size:20px;font-weight:800;}
  .top.hastitle .nm{font-size:18px;}
  .avatar{width:42px;height:42px;border-radius:50%;background:var(--primary);color:#fff;font-weight:700;
    display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;cursor:pointer;}
  .back{font-size:22px;color:var(--ink);background:none;border:none;cursor:pointer;padding:4px 8px 4px 0;}

  .content{flex:1;overflow-y:auto;padding:0 16px 16px;}
  .content::-webkit-scrollbar{width:0;}

  .hero{background:var(--primary);border-radius:20px;padding:17px;color:#fff;margin-bottom:15px;}
  .hero .k{font-size:12px;opacity:.85;} .hero .h{font-size:18px;font-weight:800;margin:4px 0 12px;}
  .hero .chips{display:flex;gap:8px;flex-wrap:wrap;} .hero .chip{font-size:11px;background:rgba(255,255,255,.18);border-radius:14px;padding:5px 10px;}
  .hero .due{font-size:11px;margin-top:12px;background:rgba(255,255,255,.16);display:inline-block;padding:5px 10px;border-radius:10px;}
  .hero .bar{height:8px;border-radius:6px;background:rgba(255,255,255,.28);overflow:hidden;margin-top:4px;}
  .hero .bar>i{display:block;height:100%;background:var(--orange);}

  .starcard{background:#fff;border-radius:18px;padding:14px 16px;box-shadow:0 4px 12px rgba(26,26,46,.05);margin-bottom:15px;display:flex;align-items:center;gap:14px;}
  .starcard .big{width:48px;height:48px;border-radius:14px;background:#FFF6E0;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .starcard .n{font-size:22px;font-weight:800;line-height:1;} .starcard .l{font-size:12px;color:var(--muted);margin-top:3px;}
  .starcard .prog{margin-left:auto;text-align:right;} .starcard .prog small{font-size:10px;color:var(--muted);}

  .cta{background:var(--primary);color:#fff;text-align:center;font-weight:800;font-size:16px;border-radius:16px;
    padding:15px;box-shadow:0 8px 18px rgba(74,58,255,.35);margin-bottom:14px;cursor:pointer;border:none;width:100%;}
  .cta.orange{background:var(--orange);box-shadow:0 8px 18px rgba(255,122,69,.35);}
  .cta.ghost{background:#fff;color:var(--primary);box-shadow:0 4px 12px rgba(26,26,46,.06);}
  .cta:disabled{opacity:.5;box-shadow:none;cursor:not-allowed;}

  .sect{font-size:14px;font-weight:800;margin:6px 0 10px;}
  .watch{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;} .film{width:92px;flex:0 0 auto;cursor:pointer;}
  .film .poster{height:66px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:27px;color:#fff;}
  .film .ft{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.2;}

  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .tile{background:#fff;border-radius:16px;padding:14px 12px;box-shadow:0 4px 12px rgba(26,26,46,.05);position:relative;cursor:pointer;}
  .tile .tic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;}
  .tile .tt{font-size:13px;font-weight:700;margin-top:8px;} .tile .ts{font-size:11px;color:var(--muted);margin-top:2px;}
  .tile.badge::after{content:attr(data-b);position:absolute;top:11px;right:11px;background:var(--pink);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;}

  .filters{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap;}
  .fp{font-size:11px;border-radius:16px;padding:6px 12px;background:#EFEFF6;color:#5b5b73;cursor:pointer;}
  .fp.on{background:var(--primary);color:#fff;font-weight:700;}

  .item{background:#fff;border-radius:14px;padding:13px;box-shadow:0 4px 10px rgba(26,26,46,.05);margin-bottom:11px;display:flex;align-items:center;gap:12px;cursor:pointer;}
  .av{width:40px;height:40px;border-radius:50%;background:#E9E7FF;display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto;}
  .it-main{flex:1;} .it-name{font-size:14px;font-weight:700;} .it-sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .go{color:var(--primary);font-size:20px;}
  .tag{font-size:10px;border-radius:8px;padding:2px 7px;font-weight:700;}
  .tag.audio{background:#E1F8F4;color:#008e7a;} .tag.foto{background:#FFF2E1;color:#c9611f;} .tag.texto{background:#EFEFF6;color:#5b5b73;}
  .tag.done{background:#E1F8F4;color:#008e7a;} .tag.adm{background:#E9E7FF;color:#4A3AFF;}
  .lvl{font-size:10px;font-weight:700;border-radius:7px;padding:2px 7px;background:#E1F8F4;color:#008e7a;}

  .ccard{background:#fff;border-radius:16px;padding:11px;box-shadow:0 4px 12px rgba(26,26,46,.05);margin-bottom:11px;display:flex;gap:12px;align-items:center;}
  .cposter{width:54px;height:66px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:27px;color:#fff;flex:0 0 auto;}
  .ctitle{font-size:13px;font-weight:700;} .cmeta{font-size:11px;color:var(--muted);margin-top:3px;}
  .cassign{font-size:11px;color:var(--primary);font-weight:700;margin-top:5px;}

  .qbox{background:#fff;border-radius:16px;padding:14px;box-shadow:0 4px 12px rgba(26,26,46,.05);margin-bottom:16px;}
  .qbox .q{font-size:15px;font-weight:600;} .qbox .from{font-size:11px;color:var(--primary);margin-top:7px;font-weight:700;}
  .lbl{font-size:12px;font-weight:700;margin:4px 0 8px;}
  .how{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .send-opts{display:flex;gap:10px;margin-bottom:16px;}
  .sopt{flex:1;background:#fff;border-radius:14px;padding:15px 8px;text-align:center;box-shadow:0 4px 10px rgba(26,26,46,.05);cursor:pointer;border:2px solid transparent;}
  .sopt.on{border-color:var(--primary);background:#F2F1FF;}
  .sopt .si{font-size:24px;} .sopt .st{font-size:11px;font-weight:700;margin-top:6px;}
  .audiorec{background:var(--primary);border-radius:16px;padding:20px;text-align:center;color:#fff;margin-bottom:16px;}
  .audiorec .mic{font-size:38px;} .audiorec .at{font-size:12px;margin-top:8px;opacity:.95;} .audiorec .wave{font-size:22px;letter-spacing:2px;margin-top:10px;opacity:.7;}

  .finp{width:100%;background:#fff;border:1px solid #e5e3f0;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;color:var(--ink);margin-bottom:12px;}
  .finp:focus{outline:none;border-color:var(--primary);}
  textarea.finp{resize:none;min-height:70px;}
  .rgrid{display:flex;gap:9px;margin-bottom:12px;} .rtype{flex:1;background:#fff;border-radius:14px;padding:12px 6px;text-align:center;box-shadow:0 3px 8px rgba(26,26,46,.05);border:2px solid transparent;position:relative;cursor:pointer;}
  .rtype .ri{font-size:22px;} .rtype .rt{font-size:11px;font-weight:700;margin-top:5px;}
  .rtype.on{border-color:var(--primary);background:#F2F1FF;} .rtype.on::after{content:"✓";position:absolute;top:5px;right:8px;color:var(--primary);font-weight:800;font-size:12px;}

  .ansphoto{height:130px;border-radius:14px;background:linear-gradient(135deg,#e9e7ff,#ffe6d9);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--primary);margin-bottom:8px;}
  .ansaudio{background:#F2F1FF;border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;color:var(--primary);font-weight:700;font-size:13px;}
  .anstext{background:#fff;border-radius:14px;padding:14px;box-shadow:0 4px 10px rgba(26,26,46,.05);font-size:13px;line-height:1.5;margin-bottom:8px;}
  .rate{text-align:center;margin:12px 0;} .rate .stars{font-size:34px;letter-spacing:5px;}
  .rate .str{cursor:pointer;color:#e2e0ee;transition:.1s;} .rate .str.on{color:var(--yellow);}

  .appt{background:#fff;border-radius:16px;padding:13px;box-shadow:0 4px 12px rgba(26,26,46,.05);margin-bottom:12px;border-left:4px solid var(--primary);}
  .appt.teal{border-left-color:var(--teal);}
  .appt .atime{font-size:12px;font-weight:800;} .appt .awho{font-size:14px;font-weight:700;margin-top:3px;}
  .appt .awhere{font-size:11px;color:var(--muted);margin-top:5px;} .appt .abadge{float:right;font-size:10px;font-weight:700;border-radius:8px;padding:2px 8px;background:#EFEFF6;color:#5b5b73;}
  .daysel{display:flex;gap:6px;margin-bottom:15px;} .day{flex:1;text-align:center;background:#fff;border-radius:12px;padding:9px 0;box-shadow:0 3px 8px rgba(26,26,46,.05);cursor:pointer;} .day .dn{font-size:10px;color:var(--muted);} .day .dd{font-size:15px;font-weight:800;margin-top:2px;} .day.on{background:var(--primary);} .day.on .dn,.day.on .dd{color:#fff;}
  .remind{background:#FFF2E1;color:#c9611f;border-radius:10px;padding:9px 12px;font-size:11px;font-weight:600;}

  .msg{background:#fff;border-radius:14px;padding:13px;box-shadow:0 4px 10px rgba(26,26,46,.05);margin-bottom:11px;}
  .msg .mh{font-size:13px;font-weight:700;} .msg .mt{font-size:12px;color:#4b4b63;margin-top:4px;} .msg .md{font-size:10px;color:var(--muted);margin-top:6px;}

  .success{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
  .success .semoji{font-size:70px;animation:pop .5s ease;} .success h2{margin:16px 0 6px;} .success p{color:var(--muted);font-size:13px;margin-bottom:24px;}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  .starsgain{font-size:34px;color:var(--yellow);letter-spacing:4px;margin-bottom:10px;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 10px;}

  /* Auth */
  .auth{flex:1;display:flex;flex-direction:column;padding:24px 22px;}
  .brand{text-align:center;margin:18px 0 8px;} .brand .logo{font-size:52px;} .brand h2{font-size:22px;margin-top:8px;} .brand p{font-size:13px;color:var(--muted);margin-top:4px;}
  .authcard{background:#fff;border-radius:20px;padding:18px;box-shadow:0 6px 18px rgba(26,26,46,.06);margin-top:14px;}
  .linkish{color:var(--primary);font-weight:700;cursor:pointer;font-size:13px;}
  .demo-row{display:flex;gap:8px;margin-top:14px;} .demo-btn{flex:1;background:#F2F1FF;border:none;border-radius:12px;padding:10px 4px;font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;margin:16px 0 6px;} .divider::before,.divider::after{content:"";flex:1;height:1px;background:#e5e3f0;}
  .rolepick{display:flex;gap:8px;margin-bottom:12px;} .rolepick .rp{flex:1;background:#fff;border:2px solid #eee;border-radius:12px;padding:11px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;} .rolepick .rp.on{border-color:var(--primary);background:#F2F1FF;color:var(--primary);}

  .tabbar{display:flex;background:#fff;border-top:1px solid #ececf5;padding:10px 0 14px;flex:0 0 auto;}
  .tab{flex:1;text-align:center;font-size:10px;color:var(--muted);cursor:pointer;} .tab .ti{font-size:20px;display:block;margin-bottom:2px;} .tab.on{color:var(--primary);font-weight:700;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:99;animation:tin .25s ease;}
  @keyframes tin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>

<h1>Protótipo</h1>
<p class="sub">Demonstração interativa. Faça login, cadastre, crie temas, responda e corrija — os dados são <b>salvos no navegador</b> (persistem ao recarregar). Troque entre os perfis a qualquer momento.</p>

<div class="controls">
  <div class="roleswitch">
    <button id="btn-login" onclick="quick('login')">🔐 Entrar</button>
    <button id="btn-aluno" onclick="quick('aluno')">👦 Aluno</button>
    <button id="btn-teacher" onclick="quick('teacher')">👩‍🏫 Teacher</button>
    <button id="btn-admin" onclick="quick('admin')">👑 Admin</button>
  </div>
  <button class="reset" onclick="resetDemo()">↺ Reiniciar demo</button>
</div>

<div class="phone"><div class="device" id="device"></div></div>

<script>
/* ---------- Estado ---------- */
var KEY = 'proto_app_aulas_v2';
function defaults(){
  return {
    todayHW: { title:'Talk about your weekend 🌤️', formats:['foto','audio'], due:'amanhã, 18h' },
    teachers: [
      {name:'Você (Fernandinha)', mode:'Admin', students:8, pend:3, self:true},
      {name:'Teacher Carol', mode:'Domicílio', students:7, pend:2},
      {name:'Teacher Bia', mode:'Domicílio', students:6, pend:1},
      {name:'Teacher Duda', mode:'Domicílio', students:6, pend:0},
      {name:'Teacher Manu', mode:'Domicílio', students:5, pend:3}
    ],
    students: [
      {name:'Lucas', emoji:'🧒', level:'A1', teacher:'Você', parents:true},
      {name:'Alice', emoji:'👧', level:'A1', teacher:'Você', parents:true},
      {name:'Miguel', emoji:'🧒', level:'A2', teacher:'Teacher Bia', parents:true},
      {name:'Sofia', emoji:'👧', level:'A1', teacher:'Teacher Manu', parents:false},
      {name:'Théo', emoji:'🧒', level:'A2', teacher:'Teacher Duda', parents:true}
    ],
    submissions: [
      {id:1, student:'João Pedro', emoji:'🧒', hw:'Write 3 sentences about your weekend', format:'audio', when:'há 10 min', status:'pending'},
      {id:2, student:'Alice', emoji:'👧', hw:'Write 3 sentences about your weekend', format:'foto', when:'há 1h', status:'pending'},
      {id:3, student:'Miguel', emoji:'🧒', hw:'Write 3 sentences about your weekend', format:'texto', when:'ontem', status:'pending', text:'On the weekend I go to the park and I play with my dog.'},
      {id:4, student:'Lucas', emoji:'🧒', hw:'Reading task', format:'texto', when:'2 dias', status:'corrected', stars:5, comment:'Excellent, Lucas! 🌟'}
    ],
    contents: [
      {title:'The Lion King', emoji:'🦁', color:'var(--orange)', level:'A1', type:'🎬 Filme · 88 min', assign:'Turma A1'},
      {title:'Finding Nemo', emoji:'🐠', color:'var(--teal)', level:'A1', type:'🎬 Filme', assign:'Lucas'},
      {title:'Song: "Hello"', emoji:'🎵', color:'var(--primary)', level:'A2', type:'🎵 Música', assign:'Turma A2'},
      {title:'Peppa Pig – ep. 12', emoji:'📺', color:'var(--pink)', level:'A1', type:'📺 Série · 5 min', assign:'Sugestão geral'}
    ],
    classes: [
      {teacher:'Carol', time:'🕐 14:00', student:'Lucas', where:'Rua das Flores, 120', mode:'Domicílio', c:''},
      {teacher:'Você', time:'🕝 14:30', student:'Alice', where:'Na sua sala', mode:'Presencial', c:'teal'},
      {teacher:'Bia', time:'🕓 16:00', student:'Miguel', where:'Av. Central, 45', mode:'Domicílio', c:''},
      {teacher:'Manu', time:'🕕 18:00', student:'Sofia', where:'Rua Verde, 300', mode:'Domicílio', c:'teal'}
    ],
    notices: [
      {mh:'📢 Enviado a todos os pais', mt:'Reunião de pais dia 20/07, às 19h. Confirmem presença! 💜', md:'você · há 1 dia · 32 famílias'},
      {mh:'📢 Enviado a todos os pais', mt:'Feriado dia 15 — não haverá aulas. Reposição na semana seguinte.', md:'você · há 4 dias · 32 famílias'}
    ],
    stars: { Lucas:340 }
  };
}
var store, current='login', user=null;
function load(){ try{ store = JSON.parse(localStorage.getItem(KEY)) || defaults(); }catch(e){ store = defaults(); } }
function save(){ localStorage.setItem(KEY, JSON.stringify(store)); }
load();

/* ---------- Navegação ---------- */
var TABS = {
  aluno:[{id:'alu-inicio',ic:'🏠',t:'Início'},{id:'alu-responder',ic:'📚',t:'Tema'},{id:'alu-assistir',ic:'🎬',t:'Assistir'},{id:'alu-estrelas',ic:'⭐',t:'Estrelas'}],
  teacher:[{id:'tea-inicio',ic:'🏠',t:'Início'},{id:'tea-tema',ic:'📚',t:'Tema'},{id:'tea-conteudos',ic:'🎬',t:'Conteúdos'},{id:'tea-agenda',ic:'📅',t:'Agenda'},{id:'tea-avisos',ic:'💬',t:'Avisos'}],
  admin:[{id:'adm-inicio',ic:'🏠',t:'Escola'},{id:'adm-teachers',ic:'👩‍🏫',t:'Teachers'},{id:'adm-alunos',ic:'🧒',t:'Alunos'},{id:'adm-agenda',ic:'📅',t:'Agenda'},{id:'adm-avisos',ic:'📢',t:'Avisos'}]
};
function nav(id){ current=id; render(); var d=document.getElementById('device'); var c=d.querySelector('.content'); if(c) c.scrollTop=0; }
function quick(role){
  if(role==='login'){ user=null; nav('login'); }
  else { user={aluno:'Lucas',teacher:'Fernandinha',admin:'Fernandinha'}[role], userRole=role; nav({aluno:'alu-inicio',teacher:'tea-inicio',admin:'adm-inicio'}[role]); }
  markSwitch(role);
}
var userRole=null;
function markSwitch(role){
  ['login','aluno','teacher','admin'].forEach(function(r){ document.getElementById('btn-'+r).classList.toggle('on', r===role); });
}
function logout(){ user=null; userRole=null; toast('Você saiu'); nav('login'); markSwitch('login'); }
function resetDemo(){ localStorage.removeItem(KEY); store=defaults(); toast('Demo reiniciada ✓'); user=null; nav('login'); markSwitch('login'); }

/* ---------- Helpers ---------- */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ var t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(function(){ t.remove(); },1800); }
function wrap(role, topHTML, bodyHTML, activeId){
  var tb='';
  if(role && TABS[role]){ tb='<div class="tabbar">'+TABS[role].map(function(t){ return '<div class="tab '+(t.id===activeId?'on':'')+'" onclick="nav(\''+t.id+'\')"><span class="ti">'+t.ic+'</span>'+t.t+'</div>'; }).join('')+'</div>'; }
  return '<div class="screen">'+topHTML+'<div class="content">'+bodyHTML+'</div>'+tb+'</div>';
}
function topUser(hi,nm,av,avColor){ return '<div class="top"><div><div class="hi">'+hi+'</div><div class="nm">'+nm+'</div></div><div class="avatar" style="'+(avColor?'background:'+avColor:'')+'" onclick="logout()" title="Sair">'+av+'</div></div>'; }
function topBack(backId,title,right){ return '<div class="top hastitle"><button class="back" onclick="nav(\''+backId+'\')">‹</button><div class="nm">'+title+'</div>'+(right||'<div style="width:24px"></div>')+'</div>'; }
function fmtTag(f){ var m={audio:'<span class="tag audio">🎤 Áudio</span>',foto:'<span class="tag foto">📷 Foto</span>',texto:'<span class="tag texto">⌨️ Texto</span>'}; return m[f]||''; }

/* ---------- Telas: AUTH ---------- */
var signupRole='admin';
function setSignupRole(r){ signupRole=r; render(); }
var SCREENS = {
  'login': function(){
    return '<div class="screen"><div class="auth">'
      +'<div class="brand"><div class="logo">🎓</div><h2>Bem-vindo!</h2><p>App da escola de aulas bilíngues</p></div>'
      +'<div class="authcard">'
        +'<div class="lbl">E-mail</div><input class="finp" placeholder="voce@email.com">'
        +'<div class="lbl">Senha</div><input class="finp" type="password" placeholder="••••••••">'
        +'<button class="cta" onclick="doLogin()">Entrar</button>'

/* ---------- Ações ---------- */
var pickedFormat=null, correctingId=null, ratingStars=4, newFormats=['foto','audio'];
function pickFmt(f){ pickedFormat=f; render(); }
function toggleFmt(f){ var i=newFormats.indexOf(f); if(i>=0){ if(newFormats.length>1) newFormats.splice(i,1); } else newFormats.push(f); render(); }
function setStars(n){ ratingStars=n; var els=document.querySelectorAll('#rateStars .str'); els.forEach(function(e,i){ e.classList.toggle('on', i<n); }); }
function openCorrect(id){ correctingId=id; ratingStars=4; nav('tea-corrigir'); }

function doLogin(){ quick('aluno'); toast('Bem-vindo! 👋'); }
function doSignup(){
  var nome=(document.getElementById('su-nome')||{}).value||'';
  if(signupRole==='admin'){ toast('Conta da escola criada 🏫'); quick('admin'); }
  else if(signupRole==='teacher'){ if(nome){ store.teachers.push({name:nome,mode:'Domicílio',students:0,pend:0}); save(); } toast('Conta de teacher criada 👩‍🏫'); quick('teacher'); }
  else { toast('Conta de responsável criada 👨‍👩‍👧'); quick('aluno'); }
}
function sendHomework(){
  var s={id:Date.now(), student:'Lucas', emoji:'🧒', hw:store.todayHW.title, format:pickedFormat, when:'agora', status:'pending'};
  if(pickedFormat==='texto'){ s.text=(document.getElementById('alu-text')||{}).value||'My answer...'; }
  store.submissions.unshift(s); save(); nav('alu-enviado'); toast('Enviado! Já está na fila da teacher ✓');
}
function sendCorrection(){
  var s=store.submissions.filter(function(x){return x.id===correctingId;})[0];
  if(s){ s.status='corrected'; s.stars=ratingStars; s.comment=(document.getElementById('corr-comment')||{}).value||''; store.stars[s.student]=(store.stars[s.student]||0)+ratingStars; save(); }
  toast('Correção enviada · +'+ratingStars+'⭐ para '+(s?s.student:'')); nav('tea-tema');
}
function publishHW(){
  var title=(document.getElementById('hw-title')||{}).value||store.todayHW.title;
  var due=(document.getElementById('hw-due')||{}).value||store.todayHW.due;
  store.todayHW={title:title, formats:newFormats.slice(), due:due}; save();
  toast('Tema publicado ✓ (o aluno já vê!)'); nav('tea-tema');
}
function addTeacher(){
  var nome=(document.getElementById('nt-nome')||{}).value; var mode=(document.getElementById('nt-mode')||{}).value||'Domicílio';
  if(!nome){ toast('Digite o nome'); return; }
  store.teachers.push({name:nome,mode:mode,students:0,pend:0}); save(); toast(nome+' adicionada ✓'); nav('adm-teachers');
}
function addStudent(){
  var nome=(document.getElementById('na-nome')||{}).value; var lvl=(document.getElementById('na-level')||{}).value||'A1'; var tea=(document.getElementById('na-teacher')||{}).value||'Você';
  if(!nome){ toast('Digite o nome'); return; }
  store.students.push({name:nome,emoji:'🧒',level:lvl,teacher:tea,parents:false}); store.stars[nome]=0; save(); toast(nome+' cadastrado(a) ✓'); nav('adm-alunos');
}
function addNotice(){
  var txt=(document.getElementById('av-text')||{}).value; if(!txt){ toast('Escreva o aviso'); return; }
  store.notices.unshift({mh:'📢 Enviado a todos os pais',mt:txt,md:'você · agora · 32 famílias'}); save(); toast('Aviso enviado 📢'); nav('adm-avisos');
}

/* ---------- Render ---------- */
function render(){ document.getElementById('device').innerHTML = (SCREENS[current]||SCREENS['login'])(); }
render();
</script>
</body>
</html>
